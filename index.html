<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧧 Lì xì đầu năm</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#fff7ed,#fde2e2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:700px;
    background:white;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    padding:20px;
}

h1{margin-top:0}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.envelope{
width:260px;
height:360px;
background:linear-gradient(#ff4d4f,#c81e1e);
border-radius:20px;
margin:auto;
position:relative;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.flap{
position:absolute;
width:100%;
height:180px;
background:#ff4d4f;
top:0;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:transform .6s;
z-index:3;
}

.content{
position:absolute;
top:140px;
width:100%;
text-align:center;
color:white;
font-size:40px;
font-weight:bold;
z-index:5;
}

.open .flap{
transform:rotateX(180deg);
z-index:1;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.open-btn{
background:#ff4d4f;
color:white;
width:100%;
margin-top:10px;
}

.copy-btn{
background:#111827;
color:white;
width:48%;
}

.admin-btn{width:48%}

.reset-btn{
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.result-box{
background:#f1f1f1;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.admin-badge{
float:right;
font-size:12px;
background:#eee;
padding:5px 10px;
border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧧 Lì xì đầu năm <span id="adminBadge" class="admin-badge" style="display:none">ADMIN</span></h1>
<p>Random từ 1.000đ → 500.000đ. Mỗi người chỉ mở 1 lần.</p>

<div class="grid">

<div class="envelope" id="envelope">
<div class="flap"></div>
<div class="content" id="money">?</div>
</div>

<div>

<label>Tên người chơi</label>
<input id="name" placeholder="VD: Minh Anh">

<div class="result-box">
Kết quả: <b id="resultMoney">—</b>
</div>

<div class="result-box">
Trạng thái: <b id="status">Chưa mở</b>
</div>

<button class="open-btn" id="openBtn">Mở bao lì xì</button>

<div style="display:flex;gap:10px;margin-top:10px;">
<button class="copy-btn" id="copyBtn">Copy số tiền</button>
<button class="admin-btn" id="adminBtn">Admin</button>
</div>

<button class="reset-btn" id="resetBtn" style="display:none">Reset lượt (admin)</button>

</div>
</div>
</div>

<script>

const ADMIN_PASSWORD="123456"
const ADMIN_TOKEN="admin"

const STEP=1000
const KEY="lixi_lock"

function randRange(min,max){
const steps=(max-min)/STEP
return min+Math.floor(Math.random()*(steps+1))*STEP
}

function randomMoney(){

const r=Math.random()

if(r<0.80) return randRange(1000,100000)
else if(r<0.90) return randRange(101000,200000)
else if(r<0.95) return randRange(201000,300000)
else if(r<0.98) return randRange(301000,400000)
else if(r<0.99) return randRange(401000,450000)
else return randRange(451000,500000)

}

function format(v){
return v.toLocaleString("vi-VN")
}

const openBtn=document.getElementById("openBtn")
const copyBtn=document.getElementById("copyBtn")
const resetBtn=document.getElementById("resetBtn")
const adminBtn=document.getElementById("adminBtn")

const moneyText=document.getElementById("money")
const resultMoney=document.getElementById("resultMoney")
const statusText=document.getElementById("status")

const envelope=document.getElementById("envelope")

function isAdmin(){
const p=new URLSearchParams(location.search)
return p.get("admin")==ADMIN_TOKEN || sessionStorage.getItem("admin")==1
}

function openEnvelope(){

if(localStorage.getItem(KEY) && !isAdmin()){
alert("Bạn đã mở rồi!")
return
}

const v=randomMoney()

envelope.classList.add("open")

moneyText.innerText=format(v)
resultMoney.innerText=format(v)+"đ"
statusText.innerText="Đã mở"

if(!isAdmin()){
localStorage.setItem(KEY,1)
}

}

openBtn.onclick=openEnvelope

copyBtn.onclick=function(){
navigator.clipboard.writeText(moneyText.innerText.replace(".",""))
}

adminBtn.onclick=function(){

if(isAdmin()){
sessionStorage.removeItem("admin")
location.reload()
return
}

const p=prompt("Nhập mật khẩu admin")

if(p===ADMIN_PASSWORD){
sessionStorage.setItem("admin",1)
location.reload()
}else{
alert("Sai mật khẩu")
}

}

resetBtn.onclick=function(){

if(!isAdmin()) return

localStorage.removeItem(KEY)

envelope.classList.remove("open")

moneyText.innerText="?"
resultMoney.innerText="—"
statusText.innerText="Chưa mở"

}

if(isAdmin()){
document.getElementById("adminBadge").style.display="inline-block"
resetBtn.style.display="block"
}

</script>

</body>
</html>
